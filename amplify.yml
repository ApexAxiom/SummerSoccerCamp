version: 1
backend:
  phases:
    build:
      commands:
        # Install dependencies and deploy the Amplify Gen 2 backend (DynamoDB
        # tables + Lambda functions + Function URLs). This writes amplify_outputs.json.
        - npm ci || npm install
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    build:
      commands:
        # The frontend is plain HTML/CSS/JS in public/. Copy the generated backend
        # config in so the browser can read the API URL, then publish public/.
        - cp amplify_outputs.json public/amplify_outputs.json
  artifacts:
    baseDirectory: public
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .npm/**/*
